<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Export Reports — SurveyForge</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout app-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="index.html" class="logo"><span class="logo-icon">◈</span> SurveyForge</a></div>
      <nav class="sidebar-nav">
        <a href="responses.html" class="sidebar-link"><span class="icon">📋</span> Responses</a>
        <a href="export.html" class="sidebar-link active"><span class="icon">📥</span> Export</a>
        <a href="analytics.html" class="sidebar-link"><span class="icon">📈</span> Analytics</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header"><div><h1 class="page-title">Export Reports</h1><p class="page-subtitle">Download survey data in multiple formats</p></div></div>
      <div class="grid grid-2 gap-3">
        <div class="glass-card p-3 text-center">
          <div style="font-size:3rem;margin-bottom:1rem">📄</div>
          <h3>Export PDF</h3>
          <p class="text-muted text-sm mb-2">Formatted report with charts</p>
          <button class="btn btn-primary" id="export-pdf">Download PDF</button>
        </div>
        <div class="glass-card p-3 text-center">
          <div style="font-size:3rem;margin-bottom:1rem">📊</div>
          <h3>Export CSV</h3>
          <p class="text-muted text-sm mb-2">Spreadsheet-compatible data</p>
          <button class="btn btn-primary" id="export-csv">Download CSV</button>
        </div>
        <div class="glass-card p-3 text-center">
          <div style="font-size:3rem;margin-bottom:1rem">{ }</div>
          <h3>Export JSON</h3>
          <p class="text-muted text-sm mb-2">Raw data for developers</p>
          <button class="btn btn-outline" id="export-json">Download JSON</button>
        </div>
        <div class="glass-card p-3 text-center">
          <div style="font-size:3rem;margin-bottom:1rem">📗</div>
          <h3>Export Excel</h3>
          <p class="text-muted text-sm mb-2">Microsoft Excel format</p>
          <button class="btn btn-outline" id="export-xlsx">Download Excel</button>
        </div>
      </div>
      <div class="glass-card p-3 mt-3">
        <h3 class="mb-2">Export Options</h3>
        <div class="form-group"><label class="form-label">Select Survey</label><select class="form-select"><option>Customer Satisfaction Survey</option><option>Employee Engagement</option><option>All Surveys</option></select></div>
        <div class="form-group"><label class="form-label">Date Range</label><div class="grid grid-2 gap-2"><input type="date" class="form-input"><input type="date" class="form-input"></div></div>
        <div class="flex items-center gap-1 mt-1"><input type="checkbox" id="include-charts" checked><label for="include-charts" class="text-sm">Include charts in PDF</label></div>
      </div>
    </main>
  </div>
  <script src="js/app.js"></script>
  <script src="js/export.js"></script>
</body>
</html>
