<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responses — SurveyForge</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div class="app-layout app-wrapper">
    <aside class="sidebar">
      <div class="sidebar-header"><a href="index.html" class="logo"><span class="logo-icon">◈</span> SurveyForge</a></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
        <a href="responses.html" class="sidebar-link active"><span class="icon">📋</span> Responses</a>
        <a href="analytics.html" class="sidebar-link"><span class="icon">📈</span> Analytics</a>
        <a href="export.html" class="sidebar-link"><span class="icon">📥</span> Export</a>
      </nav>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div><h1 class="page-title">Responses</h1><p class="page-subtitle">Manage and review survey submissions</p></div>
        <div class="flex gap-2">
          <button class="btn btn-outline" id="btn-delete-selected">Delete Selected</button>
          <a href="export.html" class="btn btn-primary">Export</a>
        </div>
      </div>

      <div class="glass-card p-3 mb-3">
        <div class="flex gap-2 flex-wrap items-center">
          <div class="search-box" style="max-width:300px">
            <span>🔍</span>
            <input type="search" id="response-search" placeholder="Search responses...">
          </div>
          <select class="form-select" id="survey-filter" style="width:auto">
            <option value="">All Surveys</option>
            <option value="demo1">Customer Satisfaction</option>
            <option value="demo2">Employee Engagement</option>
          </select>
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="today">Today</button>
          <button class="filter-chip" data-filter="week">This Week</button>
        </div>
      </div>

      <div class="glass-card" style="overflow-x:auto">
        <table class="data-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="select-all"></th>
              <th>ID</th>
              <th>Survey</th>
              <th>Preview</th>
              <th>Submitted</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="responses-tbody">
            <tr><td colspan="6"><div class="skeleton" style="height:40px;margin:0.5rem"></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="response-modal">
    <div class="modal">
      <div class="modal-header"><h3>Response Details</h3><button class="modal-close" data-modal-close>×</button></div>
      <div class="modal-body" id="response-modal-body"></div>
      <div class="modal-footer"><button class="btn btn-outline" data-modal-close>Close</button></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/responses.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => ResponsesManager.init());</script>
</body>
</html>
