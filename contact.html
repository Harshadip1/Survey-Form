<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — SurveyForge</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo"><span class="logo-icon">◈</span> SurveyForge</a>
      <div class="nav-actions"><a href="about.html" class="btn btn-ghost">About</a></div>
    </div>
  </header>
  <section class="section" style="padding-top:calc(var(--header-height) + 3rem)">
    <div class="container container-sm">
      <div class="section-header reveal">
        <h1>Contact <span class="text-gradient">Us</span></h1>
        <p class="text-muted">Have questions? We'd love to hear from you.</p>
      </div>
      <form class="glass-card p-3 reveal" id="contact-form">
        <div class="validation-summary hidden"></div>
        <div class="form-group"><label class="form-label" for="contact-name">Name *</label><input type="text" id="contact-name" name="contact-name" class="form-input" required></div>
        <div class="form-group"><label class="form-label" for="contact-email">Email *</label><input type="email" id="contact-email" name="contact-email" class="form-input" required></div>
        <div class="form-group"><label class="form-label" for="contact-subject">Subject</label><input type="text" id="contact-subject" name="contact-subject" class="form-input"></div>
        <div class="form-group"><label class="form-label" for="contact-message">Message *</label><textarea id="contact-message" name="contact-message" class="form-textarea" required></textarea></div>
        <button type="submit" class="btn btn-primary btn-lg w-full">Send Message</button>
      </form>
    </div>
  </section>
  <script src="js/app.js"></script>
  <script src="js/validation.js"></script>
  <script>
    document.getElementById('contact-form').addEventListener('submit', e => {
      e.preventDefault();
      const schema = { 'contact-name': ['required'], 'contact-email': ['required', 'email'], 'contact-message': ['required'] };
      if (FormValidation.validateForm(e.target, schema)) {
        SurveyApp.showToast('Message sent successfully!', 'success');
        e.target.reset();
      }
    });
    FormValidation.initRealtimeValidation(document.getElementById('contact-form'), {
      'contact-name': ['required'], 'contact-email': ['required', 'email'], 'contact-message': ['required']
    });
  </script>
</body>
</html>
